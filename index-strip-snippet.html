<!-- Add this HTML after </section> (the hero closing tag) in index.html -->
<div class="news-strip">
  <div class="news-strip-inner">
    <div class="news-strip-header">
      <div class="news-strip-title">
        <span class="news-live-dot"></span>
        Latest updates for newcomers
      </div>
      <a class="news-strip-link" href="news.html">View all updates →</a>
    </div>
    <div class="news-strip-cards" id="strip-cards">
      <div class="news-strip-loading">Loading latest updates...</div>
    </div>
  </div>
</div>

<!-- Add this script before </body> in index.html -->
<script>
(async function loadStrip() {
  try {
    const res = await fetch('/api/news?tab=immigration');
    if (!res.ok) return;
    const data = await res.json();

    const items = [
      ...(data.news  || []).slice(0, 2).map(i => ({ ...i, tag: 'Immigration', tagClass: 'tag-imm' })),
      ...(data.youtube || []).slice(0, 1).map(i => ({ ...i, tag: 'Video', tagClass: 'tag-cel' }))
    ].slice(0, 3);

    if (!items.length) return;

    document.getElementById('strip-cards').innerHTML = items.map(item => `
      <a class="news-strip-card" href="${item.link}" target="_blank" rel="noopener">
        <span class="news-strip-tag ${item.tagClass}">${item.tag}</span>
        <div class="news-strip-card-title">${item.title.length > 80 ? item.title.slice(0,80) + '…' : item.title}</div>
      </a>
    `).join('');
  } catch(e) {
    document.getElementById('strip-cards').innerHTML = '<a class="news-strip-card" href="news.html"><span class="news-strip-tag tag-imm">Updates</span><div class="news-strip-card-title">View latest immigration and CELPIP updates →</div></a>';
  }
})();
</script>
